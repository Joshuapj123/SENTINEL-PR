# ─────────────────────────────────────────────────────────────────────────────
# SENTINEL-PR  |  OpenEnv 2026 Specification  |  v1.2.0
# ─────────────────────────────────────────────────────────────────────────────

openenv_api: "2026.1"

env:
  name: SENTINEL-PR
  version: "1.2.0"
  description: >
    High-stakes security and dependency auditor. Agent must detect and patch
    RCE via eval(), hardcoded secrets, timing oracles, and CVE-pinned deps.
  module: env
  entry_point: make_env
  tags:
    - security
    - static-analysis
    - dependency-audit
    - reinforcement-learning
  license: Apache-2.0
  runtime:
    python: ">=3.10"
    ram_budget_gb: 8
    gpu_required: false
    port: 7860

observation_space:
  type: object
  schema_ref: "env.Observation"

action_space:
  type: object
  schema_ref: "env.Action"

reward:
  type: gradient
  range: [-18.0, 13.0]
  terminal_actions: [APPROVE, REJECT]

evaluation:
  metric: total_episode_reward
  aggregation: mean
  num_eval_episodes: 50
  baseline: 0.0
  target: 10.0

tasks:

  - id: task_hardcoded_key
    difficulty: easy
    title: "Secret Leak — Hardcoded API Key"
    max_steps: 6
    description: >
      Source file contains API_KEY = "sk-prod-..." hardcoded.
      Agent must FLAG_VULN then PROPOSE_PATCH replacing with os.environ.get().
    grader: grader.py
    grader_class: Grader
    grader_fn: grade
    grader_kwargs:
      task_id: task_hardcoded_key
      reward_min: -3.0
      reward_max: 6.0
      score_min: 0.01
      score_max: 0.99

  - id: task_vulnerable_dep
    difficulty: medium
    title: "Vulnerable Dependencies — CVE-Pinned Packages"
    max_steps: 8
    description: >
      requirements.txt pins Pillow 9.5.0, urllib3 1.26.18, cryptography 38.0.4.
      Agent must PROPOSE_PATCH upgrading all to safe versions.
    grader: grader.py
    grader_class: Grader
    grader_fn: grade
    grader_kwargs:
      task_id: task_vulnerable_dep
      reward_min: -3.0
      reward_max: 6.0
      score_min: 0.01
      score_max: 0.99

  - id: task_eval_auth_flaw
    difficulty: hard
    title: "Insecure Auth — RCE via eval() + Hardcoded Secret + CVE Deps"
    max_steps: 12
    description: >
      Flask auth middleware calls eval() on attacker-controlled JWT payload.
      eval() RCE x2, hardcoded SECRET, timing oracle, CVE deps.
    grader: grader.py
    grader_class: Grader
    grader_fn: grade
    grader_kwargs:
      task_id: task_eval_auth_flaw
      reward_min: -18.0
      reward_max: 13.0
      score_min: 0.01
      score_max: 0.99
