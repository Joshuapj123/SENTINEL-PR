openenv_api: "2026.1"

env:
  name: SENTINEL-PR
  version: "1.2.0"
  description: >
    Security auditor environment for AI agents.
  module: env
  entry_point: make_env
  tags:
    - security
    - reinforcement-learning
  license: Apache-2.0
  runtime:
    python: ">=3.10"
    ram_budget_gb: 8
    gpu_required: false
    port: 7860

observation_space:
  type: object
  schema_ref: "env.Observation"

action_space:
  type: object
  schema_ref: "env.Action"

reward:
  type: gradient
  range: [-18.0, 13.0]
  terminal_actions: [APPROVE, REJECT]

evaluation:
  metric: total_episode_reward
  aggregation: mean
  num_eval_episodes: 50
  baseline: 0.0
  target: 10.0

tasks:

  - id: task_hardcoded_key
    difficulty: easy
    title: "Secret Leak — Hardcoded API Key"
    max_steps: 6
    description: >
      Detect and patch hardcoded API key.
    grader: grader.py
    grader_class: Grader
    grader_kwargs:
      task_id: task_hardcoded_key

  - id: task_vulnerable_dep
    difficulty: medium
    title: "Vulnerable Dependencies"
    max_steps: 8
    description: >
      Detect and patch vulnerable pinned dependencies.
    grader: grader.py
    grader_class: Grader
    grader_kwargs:
      task_id: task_vulnerable_dep

  - id: task_eval_auth_flaw
    difficulty: hard
    title: "Insecure Auth — RCE via eval()"
    max_steps: 12
    description: >
      Detect and patch eval() RCE in auth middleware.
    grader: grader.py
    grader_class: Grader
    grader_kwargs:
      task_id: task_eval_auth_flaw

  - id: task_insecure_deserialization
    difficulty: medium
    title: "Insecure Deserialization"
    max_steps: 8
    description: >
      Detect and patch pickle.loads RCE.
    grader: grader.py
    grader_class: Grader
    grader_kwargs:
      task_id: task_insecure_deserialization

  - id: task_command_injection
    difficulty: hard
    title: "Command Injection"
    max_steps: 10
    description: >
      Detect and patch os.system command injection.
    grader: grader.py
    grader_class: Grader
    grader_kwargs:
      task_id: task_command_injection
